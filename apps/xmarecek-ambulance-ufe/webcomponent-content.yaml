apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: xmarecek-ambulance-ufe-content
spec:
  microFrontend: xmarecek-ambulance-ufe
  element: xmarecek-ambulance-wl-app
  attributes:
    - name: base-path
      value: ./xmarecek-ambulance-wl/
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?xmarecek-ambulance-wl(/.*)?$"